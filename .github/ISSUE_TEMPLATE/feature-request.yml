name: Feature request
description: Suggest a focused developer utility or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What repetitive developer task would this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the expected workflow and result.
    validations:
      required: true
  - type: dropdown
    id: platforms
    attributes:
      label: Most relevant platform
      options:
        - All platforms
        - Windows
        - macOS
        - Linux
    validations:
      required: true

