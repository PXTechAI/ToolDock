name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Frontend and formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Check application versions
        run: npm run check:versions

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

  native-check:
    name: Native check (${{ matrix.name }})
    needs: quality
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            platform: ubuntu-24.04
          - name: Windows
            platform: windows-latest
          - name: macOS ARM
            platform: macos-latest
          - name: macOS Intel
            platform: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libclang-dev \
            libdbus-1-dev \
            libegl-dev \
            libpipewire-0.3-dev \
            librsvg2-dev \
            libssl-dev \
            libwayland-dev \
            libwebkit2gtk-4.1-dev \
            libxcb1-dev \
            libxdo-dev \
            libxrandr-dev \
            patchelf \
            pkg-config \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare FFmpeg sidecar
        run: npm run prepare:ffmpeg

      - name: Check native application
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml
