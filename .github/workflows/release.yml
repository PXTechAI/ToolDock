name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    environment: release-signing
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles appimage,deb
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libclang-dev \
            libdbus-1-dev \
            libegl-dev \
            libgbm-dev \
            libpipewire-0.3-dev \
            librsvg2-dev \
            libssl-dev \
            libwayland-dev \
            libwebkit2gtk-4.1-dev \
            libxcb1-dev \
            libxdo-dev \
            libxrandr-dev \
            patchelf \
            pkg-config \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate release version
        run: npm run check:versions
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Prepare FFmpeg sidecar
        run: npm run prepare:ffmpeg
        env:
          TOOLDOCK_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Set up .NET
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Prepare hardware monitor sidecar
        run: npm run prepare:hardware-monitor
        env:
          TOOLDOCK_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Prepare PawnIO installer
        if: runner.os == 'Windows'
        run: npm run prepare:pawnio
        env:
          TOOLDOCK_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Detect Apple signing configuration
        id: apple-signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          configured=0
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID
          do
            if [[ -n "${!name}" ]]; then
              configured=$((configured + 1))
            else
              missing+=("$name")
            fi
          done

          if (( configured == 0 )); then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing secrets are not configured; building unsigned macOS test artifacts."
          elif (( ${#missing[@]} > 0 )); then
            echo "::error::Missing Apple release-signing secrets: ${missing[*]}"
            exit 1
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && steps.apple-signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/tooldock-developer-id.p12"
          keychain_path="$RUNNER_TEMP/tooldock-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"

          printf '%s' "$APPLE_CERTIFICATE" |
            openssl base64 -d -A -out "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -t 3600 -u "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          signing_identity="$(
            security find-identity -v -p codesigning "$keychain_path" |
              awk -F'"' '/Developer ID Application/ { print $2; exit }'
          )"
          if [[ -z "$signing_identity" ]]; then
            echo "::error::The imported certificate does not contain a Developer ID Application identity."
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"
          echo "TOOLDOCK_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          rm -f "$certificate_path"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOOLDOCK_TARGET_TRIPLE: ${{ matrix.target }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: ToolDock ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            Download the installer for your operating system from the assets below.
            See the multilingual README files for installation and usage instructions.
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: false
          retryAttempts: 2
          releaseAssetNamePattern: ToolDock_[version]_[platform]_[arch][setup][ext]
          args: ${{ matrix.args }}

      - name: Verify macOS signature and notarization
        if: runner.os == 'macOS' && steps.apple-signing.outputs.enabled == 'true'
        shell: bash
        run: |
          app_path="src-tauri/target/${{ matrix.target }}/release/bundle/macos/ToolDock.app"
          if [[ ! -d "$app_path" ]]; then
            echo "::error::Signed macOS application was not found at $app_path"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"

      - name: Remove temporary Apple signing keychain
        if: always() && runner.os == 'macOS' && steps.apple-signing.outputs.enabled == 'true'
        shell: bash
        run: |
          if [[ -n "${TOOLDOCK_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$TOOLDOCK_KEYCHAIN_PATH" || true
          fi

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Publish completed release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });

            if (release.draft) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                draft: false,
                prerelease: false,
                make_latest: "true",
              });
            }
